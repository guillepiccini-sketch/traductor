<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traductor de Voz</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Traductor">
<meta name="theme-color" content="#0e0e0e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #f0ede8; --text2: #8a8680; --text3: #55524e;
    --accent: #e8452a; --pt-color: #2a9e6e; --es-color: #d4a843;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; overflow: hidden; }
  .app { height: 100vh; height: 100dvh; display: grid; grid-template-rows: auto 1fr auto; max-width: 480px; margin: 0 auto; padding: 0 24px; }
  header { padding: 52px 0 20px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
  .lang-switcher { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 40px; padding: 6px 14px; }
  .lang-tag { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .lang-tag.es { color: var(--es-color); }
  .lang-tag.pt { color: var(--pt-color); }
  .lang-arrow { font-size: 14px; color: var(--text3); }
  .center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
  .transcript { width: 100%; min-height: 120px; display: flex; flex-direction: column; gap: 10px; justify-content: flex-end; }
  .placeholder { text-align: center; font-size: 14px; color: var(--text3); font-style: italic; line-height: 1.6; }
  .bubble { padding: 14px 18px; border-radius: 14px; animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1); border: 0.5px solid var(--border); }
  .bubble.original { background: var(--surface); font-size: 13px; color: var(--text2); line-height: 1.5; }
  .bubble.translation { background: var(--surface2); border-color: var(--border2); font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.6; }
  .bubble-label { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .bubble.original .bubble-label { color: var(--text3); }
  .bubble.translation .bubble-label { color: var(--text2); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .mic-ring { position: relative; width: 100px; height: 100px; }
  .mic-ring-pulse { position: absolute; inset: -12px; border-radius: 50%; border: 1px solid var(--accent); opacity: 0; transition: opacity 0.3s; }
  .mic-ring-pulse.active { animation: ringPulse 1.8s ease-in-out infinite; opacity: 1; }
  @keyframes ringPulse { 0% { transform: scale(0.9); opacity: 0.5; } 100% { transform: scale(1.15); opacity: 0; } }
  .mic-btn { width: 100px; height: 100px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s cubic-bezier(0.16,1,0.3,1); position: relative; outline: none; -webkit-tap-highlight-color: transparent; }
  .mic-btn:active:not(:disabled):not(.processing) { transform: scale(0.96); }
  .mic-btn.listening { background: var(--accent); border-color: transparent; }
  .mic-btn.processing { opacity: 0.4; cursor: default; }
  .mic-btn svg { width: 32px; height: 32px; fill: none; stroke: var(--text2); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
  .mic-btn.listening svg { stroke: #fff; }
  .mic-btn-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  footer { padding: 20px 0 40px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .status-indicator { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); transition: background 0.3s; flex-shrink: 0; }
  .status-indicator.listening { background: var(--accent); animation: blink 1.2s ease-in-out infinite; }
  .status-indicator.ok { background: var(--pt-color); }
  .status-indicator.processing { background: var(--es-color); animation: blink 0.8s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .status-label { font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }
  .waveform { display: flex; align-items: center; gap: 3px; height: 20px; opacity: 0; transition: opacity 0.3s; }
  .waveform.active { opacity: 1; }
  .wave-bar { width: 3px; background: var(--accent); border-radius: 2px; min-height: 4px; }
  .waveform.active .wave-bar { animation: wave 0.8s ease-in-out infinite; }
  .wave-bar:nth-child(1){animation-delay:0s} .wave-bar:nth-child(2){animation-delay:0.12s} .wave-bar:nth-child(3){animation-delay:0.24s} .wave-bar:nth-child(4){animation-delay:0.12s} .wave-bar:nth-child(5){animation-delay:0s}
  @keyframes wave { 0%,100%{height:4px} 50%{height:16px} }
  .error-toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 0.5px solid rgba(232,69,42,0.4); color: #e8452a; font-size: 12px; font-family: 'DM Sans', sans-serif; padding: 10px 18px; border-radius: 40px; white-space: nowrap; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; }
  .error-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="logo">Voz · Traductor</span>
    <div class="lang-switcher">
      <span class="lang-tag es">ES</span>
      <span class="lang-arrow">⇄</span>
      <span class="lang-tag pt">PT</span>
    </div>
  </header>
  <main class="center">
    <div class="transcript" id="transcript">
      <p class="placeholder" id="placeholder">Presioná el botón y hablá<br>en español o portugués</p>
    </div>
    <div class="mic-wrap">
      <div class="mic-ring">
        <div class="mic-ring-pulse" id="ring-pulse"></div>
        <button class="mic-btn" id="mic-btn" aria-label="Iniciar grabación">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="17" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
      </div>
      <div class="waveform" id="waveform">
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      </div>
      <span class="mic-btn-label" id="btn-label">Iniciar</span>
    </div>
  </main>
  <footer>
    <span class="status-indicator" id="status-dot"></span>
    <span class="status-label" id="status-text">Listo</span>
  </footer>
</div>
<div class="error-toast" id="error-toast"></div>

<script>
  const micBtn = document.getElementById('mic-btn');
  const btnLabel = document.getElementById('btn-label');
  const transcript = document.getElementById('transcript');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const errorToast = document.getElementById('error-toast');
  const ringPulse = document.getElementById('ring-pulse');
  const waveform = document.getElementById('waveform');

  let isListening = false;
  let recognition = null;
  const synth = window.speechSynthesis;
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    showError('Usá Chrome o Safari para reconocimiento de voz');
    micBtn.disabled = true;
  }

  function setStatus(state, msg) {
    statusText.textContent = msg;
    statusDot.className = 'status-indicator ' + (state || '');
  }

  function showError(msg) {
    errorToast.textContent = msg;
    errorToast.classList.add('show');
    setTimeout(() => errorToast.classList.remove('show'), 4000);
  }

  function addBubble(text, type, label) {
    const ph = document.getElementById('placeholder');
    if (ph) ph.remove();
    const div = document.createElement('div');
    div.className = 'bubble ' + type;
    div.innerHTML = '<span class="bubble-label">' + label + '</span>' + text;
    transcript.appendChild(div);
    while (transcript.querySelectorAll('.bubble').length > 4) {
      transcript.querySelector('.bubble').remove();
    }
  }

  function detectLang(text) {
    const ptWords = /\b(você|voce|obrigado|obrigada|olá|ola|tudo|sim|não|nao|muito|isso|este|esta|pelo|pela|também|tambem|então|entao|quando|nossa|esse|essa|gente|cara|legal|bacana|né|pois|consegue|fazer|trabalho|meu|minha|aqui|ali|bom|dia|boa|noite|tarde)\b/gi;
    return (text.match(ptWords) || []).length >= 1 ? 'pt' : 'es';
  }

  async function translate(text, fromLang) {
    const toLang = fromLang === 'es' ? 'pt' : 'es';
    const langPair = fromLang + '|' + toLang;
    const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + langPair;
    const res = await fetch(url);
    const data = await res.json();
    if (data.responseStatus !== 200) throw new Error('Translation failed');
    return data.responseData.translatedText;
  }

  function speakText(text, lang) {
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = lang === 'pt' ? 'pt-BR' : 'es-AR';
    utt.rate = 0.93;
    const voices = synth.getVoices();
    const match = voices.find(v => v.lang.startsWith(lang === 'pt' ? 'pt' : 'es'));
    if (match) utt.voice = match;
    synth.speak(utt);
    return new Promise(r => { utt.onend = r; utt.onerror = r; });
  }

  function setListeningUI(active) {
    micBtn.className = 'mic-btn' + (active ? ' listening' : '');
    ringPulse.className = 'mic-ring-pulse' + (active ? ' active' : '');
    waveform.className = 'waveform' + (active ? ' active' : '');
    btnLabel.textContent = active ? 'Escuchando...' : 'Iniciar';
  }

  function setProcessingUI(active) {
    micBtn.className = 'mic-btn' + (active ? ' processing' : '');
    btnLabel.textContent = active ? 'Traduciendo...' : 'Iniciar';
  }

  function startListening() {
    if (!SpeechRecognition) return;
    synth.cancel();
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.lang = 'es-AR';

    recognition.onstart = () => {
      isListening = true;
      setListeningUI(true);
      setStatus('listening', 'Escuchando');
    };

    recognition.onresult = async (e) => {
      const raw = e.results[0][0].transcript.trim();
      if (!raw) return;
      setListeningUI(false);
      setProcessingUI(true);
      setStatus('processing', 'Traduciendo');
      const detectedLang = detectLang(raw);
      const targetLang = detectedLang === 'es' ? 'pt' : 'es';
      addBubble(raw, 'original', detectedLang === 'es' ? '🇦🇷 Escuchado en español' : '🇧🇷 Ouvido em português');
      try {
        const translated = await translate(raw, detectedLang);
        addBubble(translated, 'translation', targetLang === 'pt' ? '→ 🇧🇷 Tradução em português' : '→ 🇦🇷 Traducido al español');
        setStatus('ok', 'Reproduciendo');
        await speakText(translated, targetLang);
      } catch (err) {
        showError('Error al traducir. Intentá de nuevo.');
      }
      setProcessingUI(false);
      setStatus('ok', 'Listo');
      isListening = false;
    };

    recognition.onerror = (e) => {
      isListening = false;
      setListeningUI(false);
      setProcessingUI(false);
      if (e.error === 'no-speech') setStatus('', 'Sin voz detectada');
      else if (e.error === 'not-allowed') showError('Permiso de micrófono denegado');
      else { setStatus('', 'Error'); showError('Error: ' + e.error); }
    };

    recognition.onend = () => {
      if (isListening) { isListening = false; setListeningUI(false); setStatus('', 'Listo'); }
    };

    recognition.start();
  }

  micBtn.addEventListener('click', () => {
    if (micBtn.classList.contains('processing')) return;
    if (isListening) recognition?.stop();
    else startListening();
  });

  synth.onvoiceschanged = () => {};
</script>
</body>
</html>
